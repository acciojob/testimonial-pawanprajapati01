<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Testimonial Section</title>
    <style>
        /* Main Container */
        .testimonial-section {
            background-color: #f5f5f5;
            padding: 40px;
            font-family: Arial, sans-serif;
        }

        /* Individual Testimonial Box */
        .testimonial {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        /* Testimonial Text */
        .testimonial p {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        /* Author Styling */
        .author {
            text-align: right;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="testimonial-section">
        
        <div class="testimonial">
            <p>"This platform has completely changed the way I learn. Highly recommended!"</p>
            <div class="author">- John Doe</div>
        </div>

        <div class="testimonial">
            <p>"Amazing experience! The content is top-notch and easy to understand."</p>
            <div class="author">- Jane Smith</div>
        </div>

        <div class="testimonial">
            <p>"A fantastic resource for anyone looking to improve their skills."</p>
            <div class="author">- Alex Johnson</div>
        </div>

    </div>

</body>
</html>
